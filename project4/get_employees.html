get_employees.html


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        table {
            width: 80%;
            margin: 30px auto;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #f5f5f5;
        }

        input {
            width: 90%;
            padding: 5px;
        }

        button {
            padding: 6px 10px;
            margin: 2px;
            cursor: pointer;
            border: none;
            color: white;
        }

        .update-btn {
            background-color: #4CAF50;
        }

        .delete-btn {
            background-color: #f44336;
        }
    </style>
</head>

<body>

<h2 style="text-align:center;">User List</h2>

<table>
    <thead>
        <tr>
            <th>Useremail</th>
            <th>empname</th>
            <th>empsalary</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody>

        {% for useremail in employeedata %}

        <tr id="row-{{ useremail }}">

            <!-- Useremail (Readonly) -->
            <td>
                <input
                    type="email"
                    value="{{ useremail }}"
                    readonly
                >
            </td>

            <!-- Email -->
            <td>
                <input
                    type="text"
                    id="email-{{ useremail }}"
                    value="{{ employeedata[useremail]['user_name'] }}"
                >
            </td>

            <!-- Password -->
            <td>
                <input
                    type="text"
                    id="password-{{ useremail }}"
                    value="{{ employeedata[useremail]['user_salary'] }}"
                >
            </td>

            <!-- Buttons -->
            <td>

                <button
                    class="update-btn"
                    onclick="updateUser('{{ useremail }}')"
                >
                    Update
                </button>

                <button
                    class="delete-btn"
                    onclick="deleteUser('{{ useremail }}')"
                >
                    Delete
                </button>

            </td>

        </tr>

        {% endfor %}

    </tbody>
</table>


<script>

function updateUser(useremail) {

    const Empname =
        document.getElementById(`email-${useremail}`).value;

    const Empsalary =
        document.getElementById(`password-${useremail}`).value;

    fetch(`/employeeupdate/${encodeURIComponent(useremail)}`, {

        method: 'PUT',

        headers: {
            'Content-Type': 'application/json'
        },

        body: JSON.stringify({
            user_name: Empname,
            user_salary: Empsalary
        })
    })

    .then(response => {

        if (!response.ok) {
            throw new Error("Update failed");
        }

        return response.json();
    })

    .then(data => {

        alert("User updated successfully");

        // Clear password field after update
        document.getElementById(`password-${useremail}`).value = "";

        console.log(data);

    })

    .catch(error => {

        console.error(error);

        alert("Error updating user");

    });
}



function deleteUser(useremail) {

    const confirmDelete =
        confirm(`Are you sure you want to delete ${useremail}?`);

    if (!confirmDelete) {
        return;
    }

    fetch(`/users/${encodeURIComponent(useremail)}`, {

        method: 'DELETE'

    })

    .then(response => {

        if (!response.ok) {
            throw new Error("Delete failed");
        }

        return response.json();
    })

    .then(data => {

        alert("User deleted successfully");

        // Remove row
        const row =
            document.getElementById(`row-${useremail}`);

        row.remove();

        console.log(data);

    })

    .catch(error => {

        console.error(error);

        alert("Error deleting user");

    });
}

</script>

</body>
</html>

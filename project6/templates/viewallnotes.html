{% extends 'dashboard.html' %}
{% block addcss %}<link rel="stylesheet" href="{{url_for('static',filename='viewallnotes.css')}}"/>{% endblock %}
{% block content %}

<div class="table-container">

    <h2>All Notes</h2>

    <table>

        <thead>
            <tr>
                <th>NID</th>
                <th>Title</th>
                <th>Created At</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>

 
            {% for i in allnotesdata %}
            <tr>
                <td>{{i[0]}}</td>
                <td>{{i[1]}}</td>
                <td>{{i[2]}}</td>

                <td>

                    <a href="{{url_for('viewnotes',nid=i[0])}}"
                       class="btn view-btn">
                        View
                    </a>

                    <a href="{{url_for('updatenotes',nid=i[0])}}"
                       class="btn update-btn">
                        Update
                    </a>

                    <a href="{{url_for('deletenotes',nid=i[0])}}"
                       class="btn delete-btn"
                       onclick="return confirm('Are you sure you want to delete this note?')">
                        Delete
                    </a>

                </td>

            </tr>
            {% endfor %}
 

        </tbody>

    </table>

</div>

{% endblock %}

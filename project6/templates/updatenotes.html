


{% extends 'dashboard.html' %}
{% block title %}<title>Updatenotes</title>{% endblock %}
{% block addcss %}<link rel="stylesheet"
      href="{{url_for('static',filename='addnotes.css')}}">
{% endblock %}

{% block content %}



<div class="note-container">

    <h2>Update Note</h2>

    <form method="POST">

        <div class="form-group">
            <label for="title">Title</label>

            <input
                type="text"
                id="title"
                name="title"
                value="{{stored_notesdata[1]}}">
        </div>

        <div class="form-group">

            <label for="description">Description</label>

            <textarea
                id="description"
                name="description"
                rows="8">{{stored_notesdata[2]}}
            </textarea>

        </div>

        <button type="submit">
            Update Note
        </button>

    </form>

</div>

{% endblock %}

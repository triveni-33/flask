<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#6a11cb,#2575fc);
        }

        .container{
            background:white;
            padding:30px;
            width:350px;
            border-radius:12px;
            box-shadow:0 4px 15px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        .form-group{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
            color:#555;
        }

        input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:6px;
            outline:none;
            transition:0.3s;
        }

        input:focus{
            border-color:#2575fc;
            box-shadow:0 0 5px rgba(37,117,252,0.5);
        }

        button{
            width:100%;
            padding:12px;
            background:#2575fc;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:16px;
            transition:0.3s;
        }

        button:hover{
            background:#1a5edb;
        }

        .login-link{
            text-align:center;
            margin-top:15px;
        }

        .login-link a{
            text-decoration:none;
            color:#2575fc;
            font-weight:bold;
        }

        .login-link a:hover{
            text-decoration:underline;
        }
    </style>
</head>
{% with messages = get_flashed_messages() %}
  {% if messages %}    
    {% for message in messages %}
      <center>{{ message }}</center>
    {% endfor %}    
  {% endif %}
{% endwith %}
<body>

    <div class="container">
        <h2>Register</h2>

        <form action="/register" method="POST">

            <div class="form-group">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter Username"
                    required
                >
            </div>

            <div class="form-group">
                <label for="useremail">Email</label>
                <input
                    type="email"
                    id="useremail"
                    name="useremail"
                    placeholder="Enter Email"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter Password"
                    required
                >
            </div>

            <button type="submit">Register</button>

            <div class="login-link">
                Already have an account?
                <a href="/login">Login</a>
            </div>

        </form>
    </div>

</body>
</html>

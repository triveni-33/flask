{% extends 'dashboard.html' %}
{% block title %}<title>Uploadfile</title>{% endblock %}
{% block addcss %}<link rel="stylesheet"
      href="{{url_for('static',filename='addnotes.css')}}">
{% endblock %}


{% block content %}



<div class="note-container">

    <h2>Upload file</h2>

    <form  method="POST" enctype="multipart/form-data">

        <div class="form-group">
            <label for="title">Title</label>

            <input
                type="file"
                id="title"
                name="file"
                placeholder="Upload a file"
                required>
        </div>

        
        <button type="submit">
            Save file
        </button>

    </form>

</div>

{% endblock %}

{% extends 'dashboard.html' %}
{% block addcss %}<link rel="stylesheet" href="{{url_for('static',filename='viewallnotes.css')}}"/>{% endblock %}
{% block content %}

<div class="table-container">

    <h2>All Files</h2>

    <table>

        <thead>
            <tr>
                <th>FID</th>
                <th>Filename</th>
                <th>Created At</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>

            
            {% for i in allfilesdata %}
            <tr>
                <td>{{i[0]}}</td>
                <td>{{i[1]}}</td>
                <td>{{i[2]}}</td>

                <td>

                    <a href="#"
                       class="btn view-btn">
                        View
                    </a>

                    <a href="#"
                       class="btn update-btn">
                        Download
                    </a>

                    <a href="{{url_for('deletefile',fid=i[0])}}"
                       class="btn delete-btn"
                       onclick="return confirm('Are you sure you want to delete this file?')">
                        Delete
                    </a>

                </td>

            </tr>
            {% endfor %}
           

        </tbody>

    </table>

</div>

{% endblock %}

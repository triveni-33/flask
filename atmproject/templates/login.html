<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <center>
        <h2>Account Login</h2>
        <form  method="POST">
            <div>
                <label for="useremail">Email:</label>
                <input type="email" id="useremail" name="useremail" placeholder="Enter email" required><br><br>
            </div>
            <div>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required><br><br>
            </div>
            <button>Login</button>
        </form>
    </center>
</body>
</html>
